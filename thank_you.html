<!DOCTYPE html>
<html lang="en">
<head>
    <title>Thank You | Swastick Capital</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/b680263a54.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="./New_CSS_files/main.css">

    <style>
        .thank-you-page{
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            background-image: linear-gradient(115deg, rgba(8, 20, 43, 0.9), rgba(20, 94, 144, 0.72)), url('./source/Images/for_background/business_blue_shade.png');
            background-size: cover;
            background-position: center;
        }
        .thank-you-card{
            width: min(680px, 100%);
            padding: clamp(30px, 5vw, 52px);
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.26);
            text-align: center;
        }
        .thank-you-icon{
            width: 74px;
            height: 74px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #dcfce7;
            color: #15803d;
            font-size: 34px;
            margin-bottom: 22px;
        }
        .thank-you-card h1{
            color: #0f172a;
            font-size: clamp(32px, 5vw, 52px);
            line-height: 1.08;
            margin-bottom: 14px;
        }
        .thank-you-card p{
            color: #64748b;
            font-size: 17px;
            max-width: 520px;
            margin: 0 auto;
        }
        .thank-you-actions{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 28px;
        }
        .thank-you-primary,
        .thank-you-secondary{
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 800;
            text-decoration: none;
            transition: transform .2s ease, background .2s ease;
        }
        .thank-you-primary{
            border: 1px solid #2563eb;
            background: #2563eb;
            color: #fff;
        }
        .thank-you-secondary{
            border: 1px solid #bfdbfe;
            background: #fff;
            color: #2563eb;
        }
        .thank-you-primary:hover,
        .thank-you-secondary:hover{
            transform: translateY(-1px);
        }
        .thank-you-primary:hover{
            background: #1d4ed8;
        }
        .thank-you-secondary:hover{
            background: #eff6ff;
        }
    </style>
</head>
<body>
    <main class="thank-you-page">
        <section class="thank-you-card">
            <div class="thank-you-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1>Thank you</h1>
            <p>Your enquiry has been received. Our team will review your details and contact you shortly.</p>
            <div class="thank-you-actions">
                <a class="thank-you-primary" href="./index.html">
                    <i class="fas fa-home"></i>
                    Back to Home
                </a>
                <a class="thank-you-secondary" href="tel:+917065207207">
                    <i class="fas fa-phone-alt"></i>
                    Call Now
                </a>
            </div>
        </section>
    </main>
</body>
</html>
